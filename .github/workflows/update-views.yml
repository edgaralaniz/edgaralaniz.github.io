name: Update YouTube View Counts

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 12:00 AM UTC
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-views:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update YouTube view counts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');

          // Load public projects file
          const projectsPath = path.join(process.cwd(), 'portfolio_projects_public.json');
          let projects = JSON.parse(fs.readFileSync(projectsPath, 'utf8'));

          const apiKey = process.env.YOUTUBE_API_KEY;
          if (!apiKey) {
            console.error('YOUTUBE_API_KEY not set in GitHub Secrets');
            process.exit(1);
          }

          // Function to extract video ID from YouTube URL
          function extractVideoId(url) {
            if (!url) return null;
            const patterns = [
              /(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&]+)/,
              /(?:https?:\/\/)?(?:www\.)?youtu\.be\/([^?]+)/,
              /(?:https?:\/\/)?(?:www\.)?youtube\.com\/shorts\/([^?]+)/,
              /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
              const match = url.match(pattern);
              if (match) return match[1];
            }
            return null;
          }

          // Fetch view counts from YouTube API
          async function updateViewCounts() {
            let updated = 0;
            let errors = 0;

            for (const project of projects) {
              const videoId = extractVideoId(project.youtube_url);
              if (!videoId) continue;

              try {
                const response = await fetch(
                  `https://www.googleapis.com/youtube/v3/videos?id=${videoId}&key=${apiKey}&part=statistics,snippet`
                );

                if (!response.ok) {
                  console.warn(`Warning: Failed to fetch data for video ${videoId}: ${response.status}`);
                  errors++;
                  continue;
                }

                const data = await response.json();
                if (data.items && data.items.length > 0) {
                  const item = data.items[0];
                  const viewCount = parseInt(item.statistics.viewCount || 0);
                  project.youtube_views = viewCount;
                  if (item.snippet) {
                    if (item.snippet.title) {
                      project.title = item.snippet.title;
                    }
                    if (item.snippet.publishedAt) {
                      project.publishedAt = item.snippet.publishedAt;
                    }
                  }
                  console.log(`Updated: ${project.title || project.my_role.substring(0, 50)}... - ${viewCount.toLocaleString()} views - Published: ${project.publishedAt}`);
                  updated++;
                }
              } catch (error) {
                console.error(`Error fetching data for video ${videoId}:`, error.message);
                errors++;
              }

              // Add small delay between API calls to avoid rate limiting
              await new Promise(resolve => setTimeout(resolve, 100));
            }

            console.log(`\nUpdate complete: ${updated} projects updated, ${errors} errors`);
            return errors === 0;
          }

          // Run the update
          updateViewCounts().then(success => {
            // Write updated data back to file
            fs.writeFileSync(projectsPath, JSON.stringify(projects, null, 2) + '\n');
            console.log('View counts updated successfully');
          }).catch(error => {
            console.error('Fatal error:', error);
            process.exit(1);
          });
          SCRIPT

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add portfolio_projects_public.json
            git commit -m "Update YouTube view counts [automated]"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          fi
